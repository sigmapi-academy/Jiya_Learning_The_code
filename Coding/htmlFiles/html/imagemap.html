<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Map</title>
</head>
<body>
    <h2>Image Maps</h2>
    <p></p>
    <img src="../images/workplace.jpg" alt="workplace" usemap="#workmap" style="width:350px; height: 300px;" >
    <map name="workmap">
        <area shape="rect" coords="100,5,240,270" href="computer.html" alt="Laptop">
        <area shape="circle" coords="300,200,40" href="coffee.html" alt="Coffee">
    </map>
</body>
</html>
